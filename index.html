<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stunning E-commerce Website</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; background: linear-gradient(135deg, #3f62a4 0%, #0a6b68 100%); }
nav { background: linear-gradient(90deg, #ff6a00, #ee0979); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 10; }
nav .logo { font-size: 1.8em; font-weight: 600; letter-spacing: 1px; }
nav input { padding: 8px 15px; border-radius: 25px; border: none; width: 220px; box-shadow: inset 0 0 5px rgba(0,0,0,0.2); transition: width 0.3s; }
nav input:focus { width: 260px; outline: none; }
header { text-align: center; padding: 80px 20px; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://source.unsplash.com/1600x400/?shopping') center/cover no-repeat; color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
header h1 { font-size: 3em; margin: 0; animation: fadeInUp 1s ease; }
header p { font-size: 1.3em; animation: fadeInUp 1.5s ease; }
@keyframes fadeInUp { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }
.products { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; padding: 40px; max-width: 1200px; margin: auto; }
.product { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.1); transition: transform 0.3s, box-shadow 0.3s; display: flex; flex-direction: column; }
.product:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 12px 25px rgba(0,0,0,0.15); }
.product img { width: 100%; height: 220px; object-fit: cover; transition: transform 0.5s; }
.product:hover img { transform: scale(1.05); }
.product h3 { margin: 15px; font-size: 1.3em; color: #333; }
.product p { margin: 0 15px 15px; color: #777; font-weight: 500; }
.product button { margin: 10px 10px; padding: 10px 15px; border: none; border-radius: 25px; background: linear-gradient(90deg, #ee0979, #ff6a00); color: white; cursor: pointer; transition: background 0.3s, transform 0.2s; font-weight: 600; letter-spacing: 0.5px; }
.product button:hover { background: linear-gradient(90deg, #ff6a00, #ee0979); transform: scale(1.05); }
</style>
</head>
<body>
<nav>
<div class="logo">Aurora Store</div>
<input type="text" id="searchBar" placeholder="Search products...">
</nav>
<header>
<h1>Discover Products You Love</h1>
<p>Curated collection for your lifestyle</p>
</header>
<section class="products" id="productList">
<div class="product" data-name="Headphones">
<img src="https://plus.unsplash.com/premium_photo-1679513691474-73102089c117?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OXx8d2lyZWxlc3MlMjBoZWFkcGhvbmVzfGVufDB8fDB8fHww" alt="Headphones" alt="Headphones">
<h3>Wireless Headphones</h3>
<p>$59</p>
<button>Buy Now</button>
<button>Add to Cart</button>
</div>
<div class="product" data-name="Watch">
<img src="https://images.unsplash.com/photo-1670404160620-a3a86428560e?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8bHV4dXJ5JTIwd2F0Y2h8ZW58MHx8MHx8fDA%3D" alt="Watch" alt="Watch">
<h3>Luxury Watch</h3>
<p>$199</p>
<button>Buy Now</button>
<button>Add to Cart</button>
</div>
<div class="product" data-name="Shoes">
<img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8c2hvZXN8ZW58MHx8MHx8fDA%3D" alt="Shoes" alt="Shoes">
<h3>Running Shoes</h3>
<p>$89</p>
<button>Buy Now</button>
<button>Add to Cart</button>
</div>
<div class="product" data-name="Backpack">
<img src="https://images.unsplash.com/photo-1622560480605-d83c853bc5c3?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTB8fGJhY2twYWNrfGVufDB8fDB8fHww" alt="Backpack" alt="Backpack">
<h3>Travel Backpack</h3>
<p>$49</p>
<button>Buy Now</button>
<button>Add to Cart</button>
</div>
<div class="product" data-name="Sunglasses">
<img src="https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8c3VuZ2xhc3Nlc3xlbnwwfHwwfHx8MA%3D%3D" alt="Sunglasses" alt="Sunglasses">
<h3>Stylish Sunglasses</h3>
<p>$29</p>
<button>Buy Now</button>
<button>Add to Cart</button>
</div>
<div class="product" data-name="Camera">
<img src="https://images.unsplash.com/photo-1502920917128-1aa500764cbd?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTZ8fGNhbWVyYXxlbnwwfHwwfHx8MA%3D%3D" alt="Camera" alt="Camera">
<h3>DSLR Camera</h3>
<p>$499</p>
<button>Buy Now</button>
<button>Add to Cart</button>
</div>
</section>
<script>
const searchBar = document.getElementById('searchBar');
const productList = document.getElementById('productList');
const products = productList.getElementsByClassName('product');
searchBar.addEventListener('keyup', function(e) {
const term = e.target.value.toLowerCase();
Array.from(products).forEach(function(product) {
const name = product.getAttribute('data-name').toLowerCase();
if (name.includes(term)) {
product.style.display = 'block';
} else {
product.style.display = 'none';
}
});
});
</script>
</body>
</html>
